<div class="mode-selection-overlay">
  <div class="selection-card">
   
    <div class="card-header">
      <h2 class="main-title">Ready to Start?</h2>
      <p class="sub-title">Choose how you want to experience <strong>{{ quizTitle }}</strong></p>
      <button class="btn-close-abs" (click)="goBack()">
        <span class="material-icons">close</span>
      </button>
    </div>


    <div class="selection-body-grid">
     
      <div class="mode-option-card" [routerLink]="['/play/solo/lobby']" queryParamsHandling="preserve">
        <div class="icon-circle solo-bg">
          <span class="material-icons">person</span>
        </div>
        <div class="text-content">
          <h3>Play Solo</h3>
          <p>Practice on your own at your own pace and climb the ranks.</p>
        </div>
        <div class="action-btn-pills">
          <span class="material-icons">arrow_forward</span>
        </div>
      </div>


      <div class="mode-option-card" [routerLink]="['/play/lobby']">
        <div class="icon-circle multi-bg">
          <span class="material-icons">groups</span>
        </div>
        <div class="text-content">
          <h3>Multi-play</h3>
          <p>Host a live session with friends or students in real-time.</p>
        </div>
        <div class="action-btn-pills">
          <span class="material-icons">arrow_forward</span>
        </div>
      </div>


    </div>
  </div>
</div>
