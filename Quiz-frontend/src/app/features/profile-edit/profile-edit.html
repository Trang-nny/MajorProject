<div class="edit-profile-container">
  <div class="edit-profile-card">
    <div class="card-header-line"></div>
   
    <div class="card-content">
      <h1 class="title">Edit Profile</h1>
      <p class="subtitle">Update your personal information and presence on the atoll.</p>


      <!-- Avatar Section -->
      <div class="avatar-section">
        <div class="avatar-wrapper">
          <img [src]="user.avatar" alt="Avatar">
          <button class="edit-avatar-btn" (click)="fileInput.click()">
            <span class="material-icons" style="font-size: 16px;">edit</span>
          </button>
          <input type="file" #fileInput style="display: none" (change)="onFileSelected($event)">
        </div>
        <h2 class="display-name">{{ user.username }}</h2>
      </div>


      <!-- Form Section -->
      <form class="profile-form">
        <div class="form-row">
          <div class="form-group flex-1">
            <label>Username</label>
            <input type="text" [(ngModel)]="user.username" name="username" placeholder="Enter username">
          </div>
          <div class="form-group flex-1">
            <label>Account ID</label>
            <div class="readonly-input">
              <span class="material-icons info-color">lock</span>
              <span>{{ user.accountId }}</span>
            </div>
          </div>
        </div>


        <div class="form-group">
          <label>Email Address</label>
          <div class="readonly-input">
            <span class="material-icons info-color">email</span>
            <span>{{ user.email }}</span>
          </div>
        </div>


        <div class="form-group">
          <label>Bio <span style="font-size: 12px; color: #8c9096; font-weight: normal;">(Max 250 characters)</span></label>
          <textarea [(ngModel)]="user.bio" name="bio" rows="4" maxlength="250"></textarea>
        </div>


        <!-- Action Buttons -->
        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn-save" (click)="saveChanges()">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
